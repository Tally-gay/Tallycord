name: Build and Release

on:
    push:
        branches:
            - main
        tags:
            - v*

env:
    FORCE_COLOR: true
    GITHUB_TOKEN: ${{ secrets.ETOKEN }}
    GH_TOKEN: ${{ github.token }}
    REPO: Equicord/Equibored
    USERNAME: GitHub-Actions

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm buildStandalone

            - name: Generate plugin lists
              run: |
                  pnpm generatePluginJson dist/plugins.json
                  pnpm generateEquicordPluginJson dist/equicordplugins.json
                  pnpm generateVencordPluginJson dist/vencordplugins.json
                  pnpm generateDevsList dist/devs.json

            - name: Collect files to be released
              run: |
                  cd dist
                  mkdir release

                  cp browser/browser.* release
                  cp Equicord.user.{js,js.LEGAL.txt} release
                  cp *.{json,zip,asar} release

                  cp desktop/* release
                  for file in tallytop/*; do
                    filename=$(basename "$file")
                    cp "$file" "release/tallytop${filename^}"
                  done

                  find release -size 0 -delete
                  rm -f release/package.json
                  rm -f release/*.map

            - name: Determine tag name
              id: get_tag
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
                  else
                    echo "tag_name=latest" >> $GITHUB_OUTPUT
                  fi

            - name: Create release if not exists
              run: |
                  TAG_NAME=${{ steps.get_tag.outputs.tag_name }}

                  if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
                    gh release create "$TAG_NAME" \
                      --title "Release $TAG_NAME" \
                      --notes "Automated release for commit ${{ github.sha }}"
                  fi

            - name: Upload files to GitHub Release
              run: |
                  TAG_NAME=${{ steps.get_tag.outputs.tag_name }}
                  gh release upload "$TAG_NAME" dist/release/* --clobber
