name: Build and Release

on:
    push:
        branches:
            - main
        tags:
            - v*

env:
    FORCE_COLOR: true

jobs:
    release-and-build:
        runs-on: ubuntu-latest
        steps:
            - name: Check out the code
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build web
              run: pnpm buildWebStandalone

            - name: Build
              run: pnpm build --standalone

            - name: Determine tag name
              id: get_tag
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
                  else
                    echo "tag_name=v${GITHUB_SHA}" >> $GITHUB_OUTPUT
                  fi

            - name: Create release if not exists
              run: |
                  TAG_NAME=${{ steps.get_tag.outputs.tag_name }}
                  if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
                  gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes "Automatically generated release for commit ${{ github.sha }}."
                  fi
              env:
                  GH_TOKEN: ${{ github.token }}

            - name: Upload files to GitHub Release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  TAG_NAME=${{ steps.get_tag.outputs.tag_name }}
                  echo "Uploading assets to release: $TAG_NAME"
                  for file in dist/*; do
                    if [ -f "$file" ]; then
                      echo "Uploading $file..."
                      gh release upload "$TAG_NAME" "$file" --clobber
                    else
                      echo "Skipping $file (not a file)"
                    fi
                  done
